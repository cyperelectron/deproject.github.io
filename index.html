<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DE Project Heating Elements</title>

<style>
:root{
  --green:#1d8f4e;
  --bg:#f4f6f8;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:var(--bg);
}

/* HEADER */
header{
  background:#fff;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.lang button{
  padding:8px 12px;
  border-radius:20px;
  border:1px solid #ddd;
  cursor:pointer;
}

.lang .active{
  background:var(--green);
  color:#fff;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
}

/* IMAGE */
.media{
  height:170px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.media img{
  max-width:100%;
  max-height:150px;
  object-fit:contain;
}

/* FILTER */
.chips{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:20px 0;
}

.chip{
  padding:10px 14px;
  border-radius:20px;
  background:#fff;
  border:1px solid #ddd;
  cursor:pointer;
}

.chip.active{
  background:var(--green);
  color:#fff;
}

/* SECTION */
.section{
  margin-top:30px;
  background:#fff;
  padding:20px;
  border-radius:20px;
}

/* RTL */
html[dir="rtl"]{
  direction:rtl;
}
</style>
</head>

<body>

<header class="container">
  <h2 id="title">DE Project</h2>

  <div class="lang">
    <button class="active" data-lang="tr">TR</button>
    <button data-lang="en">EN</button>
    <button data-lang="ar">AR</button>
  </div>
</header>

<div class="container">

<div class="section">
  <h3 id="aboutTitle"></h3>
  <p id="aboutText"></p>
</div>

<div class="chips" id="filters"></div>
<div class="grid" id="grid"></div>

</div>

<script>

/* TRANSLATIONS */
const translations={
tr:{
title:"DE Project Isıtma Elemanları",
aboutTitle:"Hakkımızda",
aboutText:"Endüstriyel ısıtma elemanlarında yüksek kalite ve mühendislik çözümleri sunuyoruz.",
all:"Tümü"
},
en:{
title:"DE Project Heating Elements",
aboutTitle:"About",
aboutText:"We provide industrial heating solutions.",
all:"All"
},
ar:{
title:"عناصر التسخين",
aboutTitle:"معلومات عنا",
aboutText:"نقدم حلول تسخين صناعية عالية الجودة.",
all:"الكل"
}
};

/* TÜM KATEGORİLER */
const categories=[
{
slug:"kitchen-heaters",
name:{tr:"Endüstriyel Mutfak Isıtıcıları",en:"Kitchen Heaters",ar:"سخانات المطبخ"},
products:[
"Bainmarie Heater","Dishwasher Heater","Tea Machine Heater",
"Deep Fryer Heater","Grill Heater","Oven Heater"
]
},
{
slug:"water-oil-heaters",
name:{tr:"Su & Yağ Isıtıcıları",en:"Water & Oil",ar:"ماء وزيت"},
products:[
"Brass Head Heater","Instant Water Heater","Washing Machine Heater","Oil Radiator Heater"
]
},
{
slug:"spiral-heaters",
name:{tr:"Spiral & Serpantin",en:"Spiral",ar:"حلزوني"},
products:["Spiral Heater","Coil Heater","Defrost Heater"]
},
{
slug:"industrial-heaters",
name:{tr:"Özel & Endüstriyel",en:"Industrial",ar:"صناعي"},
products:["Boiler Heater","Heat Exchanger Heater","Clamp Heater","Plate Heater"]
},
{
slug:"cartridge-heaters",
name:{tr:"Kartuş & Çubuk",en:"Cartridge",ar:"خرطوشة"},
products:["Cartridge Heater","Tubular Heater","Straight Heater"]
},
{
slug:"accessories",
name:{tr:"Aksesuar",en:"Accessories",ar:"ملحقات"},
products:["Thermostat","Cable","Silicone Heater","Square Tube"]
}
];

/* 🔥 SENİN GÖRSELLER */
const productImages = {
  "Bainmarie Heater":"src/img/product_1.png",
  "Dishwasher Heater":"src/img/product_2.png",
  "Tea Machine Heater":"src/img/product_3.png",
  "Deep Fryer Heater":"src/img/product_4.png",
  "Grill Heater":"src/img/product_5.png",
  "Oven Heater":"src/img/product_5.png"
};

let lang="tr";
let active="all";

const grid=document.getElementById("grid");
const filters=document.getElementById("filters");

/* UI */
function renderUI(){
  document.getElementById("title").innerText=translations[lang].title;
  document.getElementById("aboutTitle").innerText=translations[lang].aboutTitle;
  document.getElementById("aboutText").innerText=translations[lang].aboutText;
  document.documentElement.dir = lang==="ar"?"rtl":"ltr";
}

/* FILTER */
function renderFilters(){
  filters.innerHTML=`
    <div class="chip ${active==="all"?"active":""}" data-cat="all">${translations[lang].all}</div>
    ${categories.map(c=>`
      <div class="chip ${active===c.slug?"active":""}" data-cat="${c.slug}">
        ${c.name[lang]}
      </div>
    `).join("")}
  `;

  document.querySelectorAll(".chip").forEach(el=>{
    el.onclick=()=>{
      active=el.dataset.cat;
      renderFilters();
      renderProducts();
    }
  });
}

/* PRODUCTS */
function renderProducts(){
  let list=[];

  if(active==="all"){
    categories.forEach(c=>{
      c.products.forEach(p=>{
        list.push({cat:c.name[lang],name:p});
      });
    });
  }else{
    const cat=categories.find(c=>c.slug===active);
    list=cat.products.map(p=>({cat:cat.name[lang],name:p}));
  }

  grid.innerHTML=list.map(p=>`
    <div class="card">
      <div class="media">
        <img src="${productImages[p.name] || 'src/img/product_1.png'}" loading="lazy" alt="${p.name}">
      </div>
      <h3>${p.name}</h3>
      <p>${p.cat}</p>
    </div>
  `).join("");
}

/* LANG */
document.querySelectorAll(".lang button").forEach(btn=>{
  btn.onclick=()=>{
    lang=btn.dataset.lang;
    document.querySelectorAll(".lang button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    renderUI();
    renderFilters();
    renderProducts();
  }
});

renderUI();
renderFilters();
renderProducts();

</script>

</body>
</html>
