<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DE Project Heating Elements</title>
  <meta name="description" content="DE Project Heating Elements ürün kataloğu" />

  <style>
    :root{
      --green:#0b6b47;
      --bg:#f4f7f5;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --white:#ffffff;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      width:min(1300px, calc(100% - 40px));
      margin:auto;
    }

    header{
      background:var(--white);
      padding:18px 0;
      border-bottom:1px solid var(--border);
      position:sticky;
      top:0;
      z-index:50;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
    }

    .logo img{
      width:52px;
      height:52px;
      object-fit:contain;
      background:#fff;
      padding:6px;
      border-radius:14px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
    }

    .logo span{
      font-size:20px;
      font-weight:700;
      color:var(--green);
      line-height:1.2;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .nav a{
      text-decoration:none;
      font-weight:700;
      color:#374151;
      font-size:14px;
      transition:.25s;
    }

    .nav a:hover{
      color:var(--green);
    }

    .hero{
      padding:40px 0 20px;
    }

    .hero-box{
      background:linear-gradient(135deg, #0b6b47, #11875b);
      color:white;
      border-radius:24px;
      padding:38px 30px;
      box-shadow:0 20px 40px rgba(11,107,71,0.18);
    }

    .hero-box h1{
      margin:0 0 12px;
      font-size:34px;
      line-height:1.15;
    }

    .hero-box p{
      margin:0;
      max-width:720px;
      font-size:15px;
      line-height:1.7;
      color:rgba(255,255,255,0.92);
    }

    .catbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:26px 0;
    }

    .cat-btn{
      background:white;
      border:1px solid var(--border);
      padding:10px 15px;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
      font-weight:700;
      transition:.25s;
    }

    .cat-btn:hover{
      border-color:var(--green);
      color:var(--green);
    }

    .cat-btn.active{
      background:var(--green);
      color:white;
      border-color:var(--green);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:22px;
      padding-bottom:50px;
    }

    .card{
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 12px 28px rgba(0,0,0,0.06);
      transition:transform .25s ease, box-shadow .25s ease;
      display:flex;
      flex-direction:column;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 18px 36px rgba(0,0,0,0.10);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:contain;
      background:#fff;
      padding:16px;
      border-bottom:1px solid #f1f1f1;
    }

    .card-body{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      height:100%;
    }

    .card-body h3{
      margin:0;
      font-size:17px;
      line-height:1.4;
      min-height:46px;
    }

    .code{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .category{
      font-size:12px;
      color:var(--green);
      font-weight:700;
      background:#edf8f2;
      padding:7px 10px;
      border-radius:999px;
      width:max-content;
    }

    .buttons{
      display:grid;
      gap:8px;
      margin-top:auto;
      padding-top:6px;
    }

    .btn{
      display:block;
      text-align:center;
      padding:11px 14px;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
      font-size:14px;
      transition:.25s;
    }

    .btn-primary{
      background:var(--green);
      color:white;
    }

    .btn-primary:hover{
      opacity:.92;
    }

    .btn-secondary{
      background:#111827;
      color:white;
    }

    .btn-secondary:hover{
      opacity:.92;
    }

    footer{
      background:#ffffff;
      border-top:1px solid var(--border);
      padding:20px 0;
      color:#6b7280;
      font-size:14px;
      text-align:center;
    }

    @media (max-width:768px){
      .hero-box{
        padding:28px 20px;
      }

      .hero-box h1{
        font-size:26px;
      }

      .logo span{
        font-size:17px;
      }

      .logo img{
        width:46px;
        height:46px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="container topbar">
      <a href="index.html" class="logo">
        <img src="/assets/logo.png" alt="DE Project Logo">
        <span>DE Project Heating Elements</span>
      </a>

      <nav class="nav">
        <a href="index.html">Ana Sayfa</a>
        <a href="hakkimizda.html">Hakkımızda</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-box">
        <h1>Endüstriyel Rezistans Ürün Kataloğu</h1>
        <p>
          DE Project Heating Elements ürünlerini kategori bazlı inceleyin,
          ürün detaylarını görün ve hızlı teklif alın.
        </p>
      </div>
    </section>

    <div id="catbar" class="catbar"></div>
    <div id="catalog"></div>
  </main>

  <footer>
    © 2026 DE Project Heating Elements - Tüm hakları saklıdır.
  </footer>

  <script>
    let products = [];
    let activeCategory = null;

    function safe(v){
      return v || "";
    }

    function productURL(code){
      return (code || "urun").toLowerCase() + ".html";
    }

    async function load(){
      try{
        const res = await fetch("https://raw.githubusercontent.com/cyperelectron/deproject.github.io/main/data.json");
        const json = await res.json();

        const categories = Array.isArray(json) ? json : (json.categories || []);

        products = categories.flatMap(cat =>
          (cat.products || []).map(p => ({
            ...p,
            category: cat.category || cat.name || "Diğer"
          }))
        );

        renderCategories(categories);
        render(products);
      }catch(err){
        document.getElementById("catalog").innerHTML = `
          <div style="background:#fff;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.05);">
            Ürün verisi yüklenemedi.
          </div>
        `;
      }
    }

    function renderCategories(categories){
      const catbar = document.getElementById("catbar");
      const names = [...new Set(categories.map(c => c.category || c.name).filter(Boolean))];

      catbar.innerHTML = `
        <button class="cat-btn active" onclick="selectCategory(null)">Tümü</button>
        ${names.map(name => `
          <button class="cat-btn" onclick="selectCategory('${String(name).replace(/'/g, "\\'")}')">${name}</button>
        `).join("")}
      `;
    }

    function selectCategory(cat){
      activeCategory = cat;

      document.querySelectorAll(".cat-btn").forEach(btn => {
        btn.classList.remove("active");
        if((!cat && btn.innerText === "Tümü") || btn.innerText === cat){
          btn.classList.add("active");
        }
      });

      filterProducts();
    }

    function filterProducts(){
      if(!activeCategory){
        render(products);
        return;
      }

      const filtered = products.filter(p => p.category === activeCategory);
      render(filtered);
    }

    function render(list){
      const catalog = document.getElementById("catalog");

      if(!list.length){
        catalog.innerHTML = `<div style="padding:20px;background:#fff;border-radius:16px;">Ürün bulunamadı.</div>`;
        return;
      }

      catalog.innerHTML = `
        <div class="grid">
          ${list.map(p => `
            <div class="card">
              <img
                loading="lazy"
                src="${safe(p.image) || 'https://via.placeholder.com/500x320?text=DE+Project'}"
                alt="${safe(p.title)}"
              >

              <div class="card-body">
                <div class="category">${safe(p.category)}</div>
                <h3>${safe(p.title)}</h3>
                <div class="code">Ürün Kodu: ${safe(p.code)}</div>

                <div class="buttons">
                  <a class="btn btn-secondary" href="${productURL(p.code)}">Ürünü İncele</a>
                  <a class="btn btn-primary"
                     target="_blank"
                     href="https://wa.me/905462902347?text=${encodeURIComponent('Merhaba, ' + safe(p.code) + ' kodlu ' + safe(p.title) + ' ürünü hakkında bilgi almak istiyorum.')}">
                    Teklif Al
                  </a>
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    load();
  </script>

</body>
</html>
