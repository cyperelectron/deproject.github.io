<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DE Project Heating Elements</title>
<meta name="description" content="Endüstriyel rezistans ürün kataloğu">

<style>
:root{
  --green:#0b6b47;
  --bg:#f4f7f5;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
}

/* CONTAINER */
.container{
  width:min(1300px,100% - 40px);
  margin:auto;
}

/* HEADER */
header{
  background:white;
  padding:15px 0;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:100;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:50px;
  height:50px;
  background:white;
  padding:6px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.logo span{
  font-weight:bold;
  color:var(--green);
}

/* NAV */
.nav a{
  text-decoration:none;
  margin-left:15px;
  font-weight:bold;
  color:#333;
}

/* HERO */
.hero-banner{
  position:relative;
  height:500px;
  background:linear-gradient(135deg,#0b6b47,#0f8a5f);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:40px;
  border-radius:20px;
  margin:20px auto;
  overflow:hidden;
}

.hero-content{
  color:white;
  max-width:500px;
  animation:fadeUp 1s ease;
}

.hero-content h1{
  font-size:38px;
}

.hero-btn{
  display:inline-block;
  background:white;
  color:#0b6b47;
  padding:12px 20px;
  border-radius:10px;
  text-decoration:none;
  margin-top:15px;
}

/* FLOAT PRODUCTS */
.hero-products{
  display:flex;
  gap:20px;
}

.hero-products img{
  width:110px;
  height:110px;
  background:white;
  padding:10px;
  border-radius:15px;
  animation:float 4s infinite ease-in-out;
}

.hero-products img:nth-child(2){animation-delay:.5s;}
.hero-products img:nth-child(3){animation-delay:1s;}
.hero-products img:nth-child(4){animation-delay:1.5s;}

/* CATEGORY */
.catbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:20px 0;
}

.cat-btn{
  background:white;
  border:1px solid #ddd;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

.cat-btn.active{
  background:var(--green);
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:200px;
  object-fit:contain;
}

.card-body{
  padding:15px;
}

.btn{
  display:block;
  background:var(--green);
  color:white;
  padding:10px;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
  margin-top:10px;
}

/* ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

/* MOBILE */
@media(max-width:768px){
  .hero-banner{
    flex-direction:column;
    height:auto;
    text-align:center;
  }
}
</style>
</head>

<body>

<header>
  <div class="container topbar">

    <div class="logo">
      <img src="/assets/logo.png">
      <span>DE Project</span>
    </div>

    <nav class="nav">
      <a href="#">Ana Sayfa</a>
      <a href="#">Hakkımızda</a>
    </nav>

  </div>
</header>

<!-- HERO -->
<section class="container hero-banner">

  <div class="hero-content">
    <h1>Endüstriyel Rezistans Çözümleri</h1>
    <p>Kalite, performans ve güvenilir üretim</p>
    <a href="#catalog" class="hero-btn">Ürünleri İncele</a>
  </div>

  <div class="hero-products">
    <img src="/assets/p1.png">
    <img src="/assets/p2.png">
    <img src="/assets/p3.png">
    <img src="/assets/p4.png">
  </div>

</section>

<main class="container">

<div id="catbar" class="catbar"></div>
<div id="catalog"></div>

</main>

<script>
let products = [];
let activeCategory = null;

function safe(v){ return v || "" }

function productURL(code){
  return code.toLowerCase()+".html";
}

// LOAD JSON
async function load(){
  const res = await fetch("https://raw.githubusercontent.com/cyperelectron/deproject.github.io/main/data.json");
  const json = await res.json();

  const categories = json.categories;

  products = categories.flatMap(cat =>
    cat.products.map(p => ({
      ...p,
      category: cat.category
    }))
  );

  renderCategories(categories);
  render(products);
}

// CATEGORY
function renderCategories(categories){
  catbar.innerHTML = `
    <div class="cat-btn active" onclick="selectCategory(null)">Tümü</div>
    ${categories.map(c => `
      <div class="cat-btn" onclick="selectCategory('${c.category}')">${c.category}</div>
    `).join("")}
  `;
}

function selectCategory(cat){
  activeCategory = cat;

  document.querySelectorAll(".cat-btn").forEach(btn=>{
    btn.classList.remove("active");
    if(btn.innerText === cat || (!cat && btn.innerText==="Tümü")){
      btn.classList.add("active");
    }
  });

  filter();
}

function filter(){
  if(!activeCategory) return render(products);
  render(products.filter(p => p.category === activeCategory));
}

// RENDER
function render(list){
  catalog.innerHTML = `
    <div class="grid">
      ${list.map(p => `
        <div class="card">
          <img src="${safe(p.image)||'https://via.placeholder.com/300'}">

          <div class="card-body">
            <h3>${safe(p.title)}</h3>
            <div>${safe(p.code)}</div>

            <a class="btn" href="${productURL(p.code)}">Detay</a>

            <a class="btn"
            href="https://wa.me/905462902347?text=${encodeURIComponent(p.code)}">
            Teklif Al
            </a>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

load();
</script>

</body>
</html>
