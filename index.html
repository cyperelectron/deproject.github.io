<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE Project Heating Elements</title>

<style>
:root{
  --green:#0b6b47;
  --bg:#f4f7f5;
  --text:#1f2937;
  --border:#e5e7eb;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.container{
  width:min(1300px,100% - 40px);
  margin:auto;
}

/* HEADER */
header{
  background:#fff;
  padding:18px 0;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
}

.logo img{
  width:50px;
}

.logo span{
  font-weight:700;
  color:var(--green);
}

.nav a{
  margin-left:15px;
  text-decoration:none;
  font-weight:700;
  color:#333;
}

/* HERO */
.hero{
  padding:40px 0;
}

.hero-box{
  background:linear-gradient(135deg,#0b6b47,#11875b);
  color:white;
  padding:40px;
  border-radius:20px;
}

/* CATEGORY */
.catbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:20px 0;
}

.cat-btn{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
  font-weight:700;
}

.cat-btn.active{
  background:var(--green);
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.card img{
  width:100%;
  height:220px;
  object-fit:contain;
  padding:10px;
}

.card-body{
  padding:15px;
}

.category{
  font-size:12px;
  color:var(--green);
}

.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
}

.btn-primary{
  background:var(--green);
  color:white;
}

.btn-secondary{
  background:#111;
  color:white;
}

/* CONTACT */
.contact{
  margin-top:50px;
}

.contact-box{
  background:white;
  padding:25px;
  border-radius:16px;
}

/* FOOTER */
footer{
  background:white;
  margin-top:40px;
  padding:30px 0;
  border-top:1px solid var(--border);
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
  font-size:20px;
}
</style>
</head>

<body>

<header>
  <div class="container topbar">
    <a class="logo" href="#">
      <img src="/assets/logo.png">
      <span>DE Project</span>
    </a>

    <nav class="nav">
      <a href="#">Ana Sayfa</a>
      <a href="#">Hakkımızda</a>
      <a href="#contact">İletişim</a>
    </nav>
  </div>
</header>

<div class="container">

  <section class="hero">
    <div class="hero-box">
      <h1>Endüstriyel Rezistans Ürün Kataloğu</h1>
      <p>Modern, hızlı ve profesyonel ürün katalog sistemi</p>
    </div>
  </section>

  <!-- CATEGORY -->
  <div id="catbar" class="catbar"></div>

  <!-- PRODUCTS -->
  <div id="catalog"></div>

  <!-- CONTACT -->
  <section class="contact" id="contact">
    <div class="contact-box">
      <h3>İletişim</h3>
      <p>📞 +90 546 290 23 47</p>
      <p>📧 info@deproject.com</p>
      <p>📍 İstanbul, Türkiye</p>
    </div>
  </section>

</div>

<footer>
  <div class="container">
    © 2026 DE Project Heating Elements
  </div>
</footer>

<a class="whatsapp" href="https://wa.me/905462902347" target="_blank">💬</a>

<script>
let products = [];
let activeCategory = null;

async function load(){
  const res = await fetch("https://raw.githubusercontent.com/cyperelectron/deproject.github.io/main/data.json");
  const json = await res.json();

  const categories = json.categories || json;

  products = categories.flatMap(cat =>
    cat.products.map(p => ({
      ...p,
      category: cat.category || cat.name
    }))
  );

  renderCategories(categories);
  render(products);
}

function renderCategories(categories){
  const catbar = document.getElementById("catbar");

  const names = [...new Set(categories.map(c => c.category || c.name))];

  catbar.innerHTML = `
    <button class="cat-btn active" onclick="selectCategory(null)">Tümü</button>
    ${names.map(n=>`<button class="cat-btn" onclick="selectCategory('${n}')">${n}</button>`).join("")}
  `;
}

function selectCategory(cat){
  activeCategory = cat;

  document.querySelectorAll(".cat-btn").forEach(btn=>{
    btn.classList.remove("active");
    if(btn.innerText === cat || (!cat && btn.innerText==="Tümü")){
      btn.classList.add("active");
    }
  });

  filterProducts();
}

function filterProducts(){
  if(!activeCategory){
    render(products);
    return;
  }

  render(products.filter(p=>p.category===activeCategory));
}

function render(list){
  const catalog = document.getElementById("catalog");

  catalog.innerHTML = `
    <div class="grid">
      ${list.map(p=>`
        <div class="card">
          <img src="${p.image || 'https://via.placeholder.com/400'}">
          <div class="card-body">
            <div class="category">${p.category}</div>
            <h3>${p.title}</h3>

            <a class="btn btn-secondary" href="${p.code.toLowerCase()}.html">İncele</a>

            <a class="btn btn-primary"
              href="https://wa.me/905462902347?text=${encodeURIComponent(p.code + ' ürün hakkında bilgi istiyorum')}"
              target="_blank">
              Teklif Al
            </a>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

load();
</script>

</body>
</html>
