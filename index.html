<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE Project Heating Elements</title>

<style>
:root{
  --green:#0b6b47;
  --bg:#f4f7f5;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
}

.container{
  width:min(1300px, 100% - 40px);
  margin:auto;
}

/* HEADER */
header{
  background:white;
  padding:20px;
  border-bottom:1px solid #ddd;
}

h1{
  margin:0;
  color:var(--green);
}

/* CATEGORY */
.category{
  margin-top:40px;
}

.category h2{
  color:var(--green);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  transition:.2s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:200px;
  object-fit:contain;
  background:#f8f8f8;
}

.card-body{
  padding:15px;
}

.code{
  background:#e8f5ef;
  color:var(--green);
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
}

h3{
  margin:10px 0;
  font-size:16px;
}

.meta{
  font-size:13px;
  color:#666;
  margin-bottom:10px;
}

.btn{
  display:block;
  text-align:center;
  background:var(--green);
  color:white;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  text-decoration:none;
}

/* LOADING */
.loading{
  text-align:center;
  padding:40px;
  color:#666;
}

</style>
</head>

<body>

<header class="container">
  <h1>DE Project Heating Elements</h1>
</header>

<main class="container" id="catalog">
  <div class="loading">Yükleniyor...</div>
</main>

<script>
let data = null;

// 🔥 JSON LOAD (GitHub uyumlu)
async function loadData(){
  try{
    const res = await fetch("https://raw.githubusercontent.com/cyperelectron/deproject.github.io/refs/heads/main/data.json");
    data = await res.json();
    render();
  }catch(e){
    document.getElementById("catalog").innerHTML = "JSON yüklenemedi!";
    console.error(e);
  }
}

// 🔥 RENDER
function render(){
  const catalog = document.getElementById("catalog");

  catalog.innerHTML = data.categories.map(cat => `
    <div class="category">
      <h2>${cat.category}</h2>

      <div class="grid">
        ${cat.products.map(p => `
          <div class="card">
            <img src="${p.image}" onerror="this.style.display='none'"/>

            <div class="card-body">
              <span class="code">${p.code}</span>
              <h3>${p.title}</h3>

              <div class="meta">
                ${p.power ? `<div>${p.power}</div>` : ``}
                ${p.length ? `<div>${p.length}</div>` : ``}
                ${p.model ? `<div>${p.model}</div>` : ``}
                ${p.diameter ? `<div>${p.diameter}</div>` : ``}
              </div>

              <a class="btn" target="_blank"
                href="https://wa.me/905462902347?text=${encodeURIComponent(p.code + ' ' + p.title)}">
                Teklif Al
              </a>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

// START
loadData();
</script>

</body>
</html>
