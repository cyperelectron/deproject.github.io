<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE Project Heating Elements</title>

<style>
:root{
  --green:#0b6b47;
  --bg:#f4f7f5;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
}

.container{
  width:min(1300px,100% - 40px);
  margin:auto;
}

/* HEADER */
header{
  background:white;
  padding:20px;
  border-bottom:1px solid #ddd;
}

h1{
  margin:0;
  color:var(--green);
}

/* CATEGORY BAR */
.catbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:20px 0;
}

.cat-btn{
  background:white;
  border:1px solid #ddd;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
}

.cat-btn.active{
  background:var(--green);
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.card img{
  width:100%;
  height:200px;
  object-fit:contain;
}

.card-body{
  padding:15px;
}

h3{
  margin:0 0 10px;
  font-size:16px;
}

.code{
  font-size:12px;
  color:#666;
  margin-bottom:10px;
}

.btn{
  display:block;
  background:var(--green);
  color:white;
  text-align:center;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
}
</style>
</head>

<body>

<header class="container">
  <h1>DE Project Heating Elements</h1>
</header>

<main class="container">

<!-- CATEGORY BUTTONS -->
<div id="catbar" class="catbar"></div>

<!-- PRODUCTS -->
<div id="catalog"></div>

</main>

<script>
let products = [];
let activeCategory = null;

function safe(v){ return v || "" }

// 🔥 LOAD JSON
async function load(){
  const res = await fetch("https://raw.githubusercontent.com/cyperelectron/deproject.github.io/main/data.json");
  const json = await res.json();

  const categories = Array.isArray(json) ? json : json.categories;

  products = categories.flatMap(cat =>
    (cat.products || []).map(p => ({
      ...p,
      category: cat.category
    }))
  );

  renderCategories(categories);
  render(products);
}

// 🔥 CATEGORY BUTTONS
function renderCategories(categories){
  const names = categories.map(c => c.category);

  catbar.innerHTML = `
    <div class="cat-btn active" onclick="selectCategory(null)">Tümü</div>
    ${names.map(name => `
      <div class="cat-btn" onclick="selectCategory('${name}')">${name}</div>
    `).join("")}
  `;
}

// 🔥 SELECT CATEGORY
function selectCategory(cat){

  activeCategory = cat;

  // UI aktif buton
  document.querySelectorAll(".cat-btn").forEach(btn=>{
    btn.classList.remove("active");
    if(btn.innerText === cat || (!cat && btn.innerText==="Tümü")){
      btn.classList.add("active");
    }
  });

  filter();
}

// 🔥 FILTER
function filter(){

  if(!activeCategory){
    render(products);
    return;
  }

  const filtered = products.filter(p => p.category === activeCategory);
  render(filtered);
}

// 🔥 RENDER
function render(list){
  catalog.innerHTML = `
    <div class="grid">
      ${list.map(p => `
        <div class="card">
          <img src="${safe(p.image)||'https://via.placeholder.com/300'}">

          <div class="card-body">
            <h3>${safe(p.title)}</h3>
            <div class="code">${safe(p.code)}</div>

            <a class="btn"
            href="https://wa.me/905462902347?text=${encodeURIComponent(p.code+' '+p.title)}">
            Teklif Al
            </a>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

// START
load();
</script>

</body>
</html>
