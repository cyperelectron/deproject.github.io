<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE Project Heating Elements</title>

<style>
:root{
  --green:#1d8f4e;
  --bg:#f4f6f8;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:var(--bg);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

header{
  background:#fff;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.lang button{
  padding:8px 12px;
  border-radius:20px;
  border:1px solid #ddd;
  cursor:pointer;
}

.lang .active{
  background:var(--green);
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.media{
  height:150px;
  background:linear-gradient(135deg,#57c261,#1d8f4e);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

/* FILTER */
.chips{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:20px 0;
}

.chip{
  padding:10px;
  border-radius:20px;
  background:#fff;
  border:1px solid #ddd;
  cursor:pointer;
}

.chip.active{
  background:var(--green);
  color:#fff;
}

/* ABOUT & CONTACT */
.section{
  margin-top:40px;
}

.card-box{
  background:#fff;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

/* RTL */
html[dir="rtl"]{
  direction:rtl;
}
</style>
</head>

<body>

<header class="container">
  <h2 id="title">DE Project</h2>

  <div class="lang">
    <button class="active" data-lang="tr">TR</button>
    <button data-lang="en">EN</button>
    <button data-lang="ar">AR</button>
  </div>
</header>

<div class="container">

<!-- HAKKIMIZDA -->
<div class="section card-box">
  <h3 id="aboutTitle"></h3>
  <p id="aboutText"></p>
</div>

<!-- FILTER -->
<div class="chips" id="filters"></div>

<!-- PRODUCTS -->
<div class="grid" id="grid"></div>

<!-- CONTACT -->
<div class="section card-box">
  <h3 id="contactTitle"></h3>
  <p>📞 +90 555 000 00 00</p>
  <p>✉️ info@deproject.com</p>
  <a href="https://wa.me/905550000000">
    <button style="width:100%;margin-top:10px;background:#25D366;color:#fff;border:none;padding:10px;border-radius:20px">
      WhatsApp
    </button>
  </a>
</div>

</div>

<script>

const translations={
tr:{
title:"DE Project Isıtma Elemanları",
aboutTitle:"Hakkımızda",
aboutText:"Endüstriyel ısıtma elemanlarında yüksek kalite ve mühendislik çözümleri sunuyoruz.",
contactTitle:"İletişim",
all:"Tümü"
},
en:{
title:"DE Project Heating Elements",
aboutTitle:"About Us",
aboutText:"We provide high quality industrial heating solutions.",
contactTitle:"Contact",
all:"All"
},
ar:{
title:"عناصر التسخين",
aboutTitle:"معلومات عنا",
aboutText:"نقدم حلول تسخين صناعية عالية الجودة.",
contactTitle:"اتصل بنا",
all:"الكل"
}
};

const categories=[
{
slug:"kitchen-heaters",
name:{
tr:"Endüstriyel Mutfak Isıtıcıları",
en:"Kitchen Heaters",
ar:"سخانات المطبخ"
},
products:[
"Bainmarie Heater","Dishwasher Heater","Tea Machine Heater",
"Deep Fryer Heater","Grill Heater","Oven Heater"
]
},
{
slug:"water-oil-heaters",
name:{
tr:"Su ve Yağ Isıtıcıları",
en:"Water & Oil Heaters",
ar:"سخانات الماء والزيت"
},
products:[
"Brass Head Heater","Instant Water Heater",
"Washing Machine Heater","Oil Radiator Heater"
]
},
{
slug:"spiral-heaters",
name:{
tr:"Spiral & Serpantin Isıtıcılar",
en:"Spiral Heaters",
ar:"سخانات حلزونية"
},
products:["Spiral Heater","Coil Heater","Defrost Heater"]
},
{
slug:"industrial-heaters",
name:{
tr:"Özel & Endüstriyel Isıtıcılar",
en:"Industrial Heaters",
ar:"سخانات صناعية"
},
products:[
"Boiler Heater","Heat Exchanger Heater",
"Clamp Heater","Plate Heater"
]
},
{
slug:"cartridge-heaters",
name:{
tr:"Kartuş & Çubuk Isıtıcılar",
en:"Cartridge Heaters",
ar:"سخانات خرطوشة"
},
products:[
"Cartridge Heater","Tubular Heater","Straight Heater"
]
},
{
slug:"accessories",
name:{
tr:"Aksesuar & Diğer",
en:"Accessories",
ar:"ملحقات"
},
products:[
"Thermostat (Cotherm)","Cable (Monoset)",
"Silicone Heater","Square Tube"
]
}
];

let lang="tr";
let active="all";

const grid=document.getElementById("grid");
const filters=document.getElementById("filters");

function renderUI(){
  document.getElementById("title").innerText=translations[lang].title;
  document.getElementById("aboutTitle").innerText=translations[lang].aboutTitle;
  document.getElementById("aboutText").innerText=translations[lang].aboutText;
  document.getElementById("contactTitle").innerText=translations[lang].contactTitle;

  document.documentElement.dir = lang==="ar" ? "rtl" : "ltr";
}

function renderFilters(){
  filters.innerHTML=`
    <div class="chip ${active==="all"?"active":""}" data-cat="all">
      ${translations[lang].all}
    </div>
    ${categories.map(c=>`
      <div class="chip ${active===c.slug?"active":""}" data-cat="${c.slug}">
        ${c.name[lang]}
      </div>
    `).join("")}
  `;

  document.querySelectorAll(".chip").forEach(el=>{
    el.onclick=()=>{
      active=el.dataset.cat;
      renderFilters();
      renderProducts();
    }
  });
}

function renderProducts(){
  let list=[];

  if(active==="all"){
    categories.forEach(c=>{
      c.products.forEach(p=>{
        list.push({cat:c.name[lang],name:p});
      });
    });
  }else{
    const cat=categories.find(c=>c.slug===active);
    list=cat.products.map(p=>({cat:cat.name[lang],name:p}));
  }

  grid.innerHTML=list.map(p=>`
    <div class="card">
      <div class="media">Product</div>
      <h3>${p.name}</h3>
      <p>${p.cat}</p>
    </div>
  `).join("");
}

document.querySelectorAll(".lang button").forEach(btn=>{
  btn.onclick=()=>{
    lang=btn.dataset.lang;

    document.querySelectorAll(".lang button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    renderUI();
    renderFilters();
    renderProducts();
  }
});

renderUI();
renderFilters();
renderProducts();

</script>

</body>
</html>
