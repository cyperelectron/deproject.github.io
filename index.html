<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endüstriyel Mutfak Isıtıcıları</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  margin:0;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.media{
  height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.media img{
  max-width:100%;
  max-height:160px;
  object-fit:contain;
}

h3{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Endüstriyel Mutfak Isıtıcıları</h1>

<div class="grid">

<div class="card">
  <div class="media">
    <img src="/mnt/data/product_1.png">
  </div>
  <h3>Bainmarie Heater</h3>
</div>

<div class="card">
  <div class="media">
    <img src="/mnt/data/product_2.png">
  </div>
  <h3>Dishwasher Heater</h3>
</div>

<div class="card">
  <div class="media">
    <img src="/mnt/data/product_3.png">
  </div>
  <h3>Tea Machine Heater</h3>
</div>

<div class="card">
  <div class="media">
    <img src="/mnt/data/product_4.png">
  </div>
  <h3>Deep Fryer Heater</h3>
</div>

<div class="card">
  <div class="media">
    <img src="/mnt/data/product_5.png">
  </div>
  <h3>Grill Heater</h3>
</div>

</div>

</div>

</body>
</html>
